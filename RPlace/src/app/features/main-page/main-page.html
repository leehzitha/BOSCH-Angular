<app-header></app-header>
    <div class="main-container">
        <div class="container">
            @for (row of rows; track $index; let i = $index) {
                <div class="row">
                @for (pixel of pixels; track $index; let j = $index){
                    <app-pixel (onClick)="handlePixelClick($event)"></app-pixel>
                }
                </div>
            }
        </div>
        <app-color-modal [modal]="modal"></app-color-modal>
       
    </div>
