<div class="main">
    <p class="title">Pratos Prontos</p>
    <div class="_foods">
        <app-comida-card 
            *ngFor="let foodi of foods; track: $index"
            [food] = "foodi"
            (onClick)="clicked($event)">
        </app-comida-card>
    </div>
    <app-comida-details-modal 
        *ngIf = "abrido == true"
        (onClick)="close()"
        [food] = "this.selectedFood">
    </app-comida-details-modal>
   <p>{{abrido}}</p>
</div>
